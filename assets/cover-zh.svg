  <text x="937" y="289" fill="#778196" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="13">品牌 / 内容 / 产品逻辑</text>
  <path d="M870 311H1170" stroke="#FFFFFF" stroke-opacity="0.1"/>
  <text x="870" y="364" fill="#F5F7FA" font-family="Arial, sans-serif" font-size="34" font-weight="800">03</text>
  <text x="937" y="355" fill="#DCE2EC" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="800">浏览器验收</text>
  <text x="937" y="377" fill="#778196" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="13">表现 / 权益 / 交付</text>

  <text x="1188" y="449" fill="#7E8799" text-anchor="end" font-family="Arial, Helvetica, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">@sciencedegens</text>
  <rect x="0.5" y="0.5" width="1279" height="479" rx="23.5" stroke="#FFFFFF" stroke-opacity="0.12"/>
