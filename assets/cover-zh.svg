    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#FFFFFF" stroke-opacity="0.045"/>
    </pattern>
  </defs>

  <rect width="1280" height="480" rx="24" fill="#090B11"/>
  <rect width="1280" height="480" rx="24" fill="url(#grid)"/>
  <circle cx="1110" cy="95" r="118" fill="#FF4FA0" fill-opacity="0.18" filter="url(#blur)"/>
  <circle cx="875" cy="388" r="135" fill="#23D7FF" fill-opacity="0.16" filter="url(#blur)"/>

  <text x="74" y="74" fill="#9CA5B8" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="3.2">AGENT SKILL  /  WEBSITE REMIX</text>
  <text x="72" y="206" fill="url(#titleColor)" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="104" font-weight="900">万能复刻</text>
  <text x="76" y="262" fill="#F4F6FA" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="28" font-weight="700">借鉴体验，重做产品。</text>
  <text x="76" y="304" fill="#AAB2C2" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="18">从证据出发，把参考网站重构成真正属于你的作品。</text>

