  <text x="937" y="179" fill="#DCE2EC" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="800">观察参考</text>
  <text x="937" y="201" fill="#778196" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="13">结构 / 节奏 / 交互</text>
