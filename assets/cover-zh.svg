  <text x="98" y="371" fill="#F5F7FA" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="1.2">取证  ·  重构  ·  验收</text>
  <text x="98" y="399" fill="#778196" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="14">支持 Codex 与 Claude Code</text>

