<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">万能复刻</title>
  <desc id="desc">证据优先的网站体验复刻与产品化重构 Skill 横幅。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBFCFE"/>
      <stop offset="1" stop-color="#F1F5F9"/>
    </linearGradient>
    <linearGradient id="accent" x1="332" y1="286" x2="948" y2="286" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0EA5E9"/>
      <stop offset="0.5" stop-color="#10B981"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#0F172A" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>

  <rect x="0.5" y="0.5" width="1279" height="419" rx="30" fill="url(#bg)" stroke="#D9E1EC"/>
  <rect x="40" y="40" width="1200" height="340" rx="28" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#shadow)"/>
  <rect x="40" y="40" width="1200" height="340" rx="28" fill="url(#grid)"/>

  <text x="160" y="125" fill="#64748B" font-family="Inter, PingFang SC, Microsoft YaHei, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="760" letter-spacing="2.4">智能体技能 / 网站体验重构</text>
  <text x="160" y="202" fill="#0F172A" font-family="Inter, PingFang SC, Microsoft YaHei, ui-sans-serif, system-ui, sans-serif" font-size="78" font-weight="840" letter-spacing="0">万能复刻</text>
  <text x="160" y="247" fill="#334155" font-family="Inter, PingFang SC, Microsoft YaHei, ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="520">把参考网站，改造成自己的高级产品体验。</text>

  <line x1="160" y1="286" x2="840" y2="286" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
  <g font-family="Inter, PingFang SC, Microsoft YaHei, ui-sans-serif, system-ui, sans-serif">
    <circle cx="160" cy="286" r="7" fill="#0EA5E9"/>
    <circle cx="500" cy="286" r="7" fill="#10B981"/>
    <circle cx="840" cy="286" r="7" fill="#6366F1"/>
    <text x="160" y="326" fill="#0F172A" font-size="16" font-weight="780">参考站</text>
    <text x="500" y="326" fill="#0F172A" font-size="16" font-weight="780">证据链</text>
    <text x="840" y="326" fill="#0F172A" font-size="16" font-weight="780">自有产品</text>
    <text x="160" y="351" fill="#64748B" font-size="13" font-weight="520">结构与节奏</text>
    <text x="500" y="351" fill="#64748B" font-size="13" font-weight="520">源码 / 部分证据 / 推测</text>
    <text x="840" y="351" fill="#64748B" font-size="13" font-weight="520">原创输出</text>
  </g>
</svg>
