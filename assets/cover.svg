<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Wannengcopy abstract cover</title>
  <desc id="desc">A colorful abstract cover image for the Wannengcopy agent skill.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070A12"/>
      <stop offset="0.45" stop-color="#0D1322"/>
      <stop offset="1" stop-color="#06111A"/>
    </linearGradient>
    <radialGradient id="cyan" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(235 110) rotate(18) scale(360 180)">
      <stop stop-color="#22D3EE" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pink" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 95) rotate(155) scale(360 190)">
      <stop stop-color="#F472B6" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#F472B6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lime" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(800 340) rotate(-20) scale(350 150)">
      <stop stop-color="#A3E635" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#A3E635" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violet" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(480 312) rotate(16) scale(480 160)">
      <stop stop-color="#8B5CF6" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ribbonA" x1="112" y1="284" x2="1168" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.26" stop-color="#60A5FA"/>
      <stop offset="0.48" stop-color="#A78BFA"/>
      <stop offset="0.72" stop-color="#FB7185"/>
      <stop offset="1" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="ribbonB" x1="118" y1="124" x2="1155" y2="324" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399"/>
      <stop offset="0.32" stop-color="#22D3EE"/>
      <stop offset="0.62" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="blur60" x="-25%" y="-55%" width="150%" height="210%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="42"/>
    </filter>
    <filter id="softGlow" x="-15%" y="-70%" width="130%" height="240%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.16"/>
      </feComponentTransfer>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#FFFFFF" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="420" rx="32" fill="url(#bg)"/>
  <rect width="1280" height="420" rx="32" fill="url(#cyan)"/>
  <rect width="1280" height="420" rx="32" fill="url(#pink)"/>
  <rect width="1280" height="420" rx="32" fill="url(#lime)"/>
  <rect width="1280" height="420" rx="32" fill="url(#violet)"/>
  <rect width="1280" height="420" rx="32" fill="url(#grid)"/>

  <g filter="url(#blur60)" opacity="0.78">
    <path d="M42 291C185 202 291 190 420 229C548 267 624 317 768 270C911 222 1010 119 1230 154" stroke="url(#ribbonA)" stroke-width="72" stroke-linecap="round"/>
    <path d="M64 138C198 184 301 238 452 203C605 168 715 55 863 83C1008 110 1095 260 1220 303" stroke="url(#ribbonB)" stroke-width="58" stroke-linecap="round"/>
  </g>

  <g filter="url(#softGlow)" opacity="0.96">
    <path d="M66 286C222 196 334 206 471 251C610 297 706 307 842 230C968 158 1062 131 1210 166" stroke="url(#ribbonA)" stroke-width="10" stroke-linecap="round"/>
    <path d="M84 150C236 214 353 246 498 187C641 129 739 65 880 92C1019 119 1093 254 1202 300" stroke="url(#ribbonB)" stroke-width="8" stroke-linecap="round"/>
  </g>

  <g opacity="0.72">
    <rect x="104" y="86" width="1072" height="248" rx="30" fill="url(#glass)" stroke="#FFFFFF" stroke-opacity="0.16"/>
    <path d="M160 258C258 206 349 207 460 246C568 284 656 290 762 234C887 168 1002 151 1120 194" stroke="#FFFFFF" stroke-opacity="0.28" stroke-width="1.2"/>
    <path d="M160 166C277 219 376 231 495 181C629 125 751 108 878 157C976 195 1045 243 1120 262" stroke="#FFFFFF" stroke-opacity="0.22" stroke-width="1.2"/>
  </g>

  <g opacity="0.92">
    <circle cx="226" cy="210" r="5" fill="#22D3EE"/>
    <circle cx="482" cy="244" r="5" fill="#60A5FA"/>
    <circle cx="706" cy="258" r="5" fill="#A78BFA"/>
    <circle cx="912" cy="183" r="5" fill="#FB7185"/>
    <circle cx="1062" cy="214" r="5" fill="#FBBF24"/>
  </g>

  <rect width="1280" height="420" rx="32" fill="#000000" opacity="0.08"/>
  <rect width="1280" height="420" rx="32" filter="url(#grain)" opacity="0.28"/>
  <rect x="0.5" y="0.5" width="1279" height="419" rx="31.5" stroke="#FFFFFF" stroke-opacity="0.16"/>
</svg>
